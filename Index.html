<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>MedList</title>
<script>
/* Force viewport inside Apps Script sandbox iframe.
   Apps Script wraps our HTML in a userCodeAppPanel iframe that ignores the
   outer viewport meta — we have to re-set it once on boot. */
(function(){
  function forceViewport(){
    var mv = document.querySelector('meta[name="viewport"]');
    if (!mv){
      mv = document.createElement('meta');
      mv.name = 'viewport';
      document.head.appendChild(mv);
    }
    mv.content = 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover';
  }
  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', forceViewport);
  } else {
    forceViewport();
  }
})();
</script>
<style>
/* ═══════════════════════════════════════════════════════════════
   ROOT FONT SIZE — drives everything via rem.
   18px base on desktop, 19px on phones (where the issue was).
   Using rem means changing html{font-size} rescales the whole app.
   ═══════════════════════════════════════════════════════════════ */
html {
  font-size: 18px;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}
@media (max-width: 768px) {
  html { font-size: 19px; }
}
@media (max-width: 420px) {
  html { font-size: 19px; }
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg: #0a0a0a;
  --bg2: #141414;
  --card: #1c1c1c;
  --card2: #252525;
  --border: #2e2e2e;
  --border2: #3d3d3d;
  --text: #f1f3f5;
  --muted: #9aa0a6;
  --primary: #3b82f6;
  --primary-dark: #2563eb;
  --danger: #ef4444;
  --success: #22c55e;
  --tap: 3rem;      /* 54px @ 18px, 57px @ 19px */
  --tap-lg: 3.25rem;
}

html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 1rem;         /* = root font-size */
  line-height: 1.4;
  display: flex;
  flex-direction: column;
  padding-top: env(safe-area-inset-top);
}

/* ═══════════════════════════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════════════════════════ */
.hdr {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0.75rem 0.9rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-shrink: 0;
  z-index: 200;
}
.hdr-left { display: flex; align-items: baseline; gap: 0.6rem; flex: 1; min-width: 0; }
.hdr h1 { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em; }
.census { font-size: 0.9rem; color: var(--muted); font-weight: 500; }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.3rem;
  padding: 0 1.1rem;
  border: none;
  border-radius: 0.7rem;
  font-size: 1rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  min-height: var(--tap);
}
.btn-blue { background: var(--primary); color: #fff; }
.btn-blue:active { background: var(--primary-dark); transform: scale(0.97); }
.btn-ghost { background: transparent; color: var(--muted); border: 1.5px solid var(--border2); }
.btn-sm { min-height: 2.5rem; padding: 0 0.85rem; font-size: 0.9rem; }

/* ═══════════════════════════════════════════════════════════════
   VIEWS
   ═══════════════════════════════════════════════════════════════ */
.view { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
.hidden { display: none !important; }

/* ═══════════════════════════════════════════════════════════════
   LIST TOOLBAR
   ═══════════════════════════════════════════════════════════════ */
.toolbar {
  display: flex;
  gap: 0.5rem;
  padding: 0.6rem 0.75rem;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.search {
  flex: 1;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 0.7rem;
  padding: 0 1rem;
  color: var(--text);
  font-family: inherit;
  font-size: 1rem;
  outline: none;
  min-height: var(--tap);
  -webkit-appearance: none;
}
.search:focus { border-color: var(--primary); }
.search::placeholder { color: var(--muted); }
.sort-btn {
  background: var(--card);
  border: 1.5px solid var(--border);
  color: var(--muted);
  border-radius: 0.7rem;
  padding: 0 0.9rem;
  font-size: 1rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  min-height: var(--tap);
  white-space: nowrap;
  flex-shrink: 0;
}
.sort-btn.active { border-color: var(--primary); color: var(--primary); }
.sort-btn:active { background: var(--card2); }

/* ═══════════════════════════════════════════════════════════════
   PATIENT LIST
   ═══════════════════════════════════════════════════════════════ */
#listView { background: var(--bg); }
.pt-list {
  flex: 1;
  overflow-y: auto;
  padding: 0.75rem;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

.pt-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 0.9rem;
  margin-bottom: 0.75rem;
  overflow: hidden;
  user-select: none;
  transition: background 0.1s;
}
.pt-card:active { background: var(--card2); }

/* Top row: dot + name/badges + chevron */
.pt-top {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.85rem 0.85rem 0.75rem;
  cursor: pointer;
}
.pt-dot-btn {
  width: 2.75rem;
  height: 2.75rem;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  border: 2px solid rgba(255, 255, 255, 0.06);
  transition: transform 0.12s;
}
.pt-dot-btn:active { transform: scale(0.9); }
.pt-dot-blank {
  background: transparent;
  border: 2px dashed var(--border2);
}
.pt-dot-label {
  font-size: 0.55rem;
  font-weight: 900;
  color: #fff;
  letter-spacing: 0.02em;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
}
.pt-info { flex: 1; min-width: 0; }
.pt-name {
  font-size: 1.15rem;
  font-weight: 700;
  color: #60a5fa;
  line-height: 1.2;
  word-break: break-word;
  margin-bottom: 0.35rem;
}
.pt-meta { display: flex; flex-wrap: wrap; gap: 0.3rem; align-items: center; }
.pt-chevron {
  color: var(--muted);
  font-size: 1.5rem;
  font-weight: 300;
  flex-shrink: 0;
  padding: 0 0.2rem;
}

/* Task section — separate clickable zone */
.pt-tasks {
  border-top: 1.5px solid var(--border);
  padding: 0.7rem 0.85rem 0.75rem;
  background: rgba(0, 0, 0, 0.15);
}
.pt-tasks-hdr {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.45rem;
}
.pt-tasks-title {
  font-size: 0.72rem;
  font-weight: 800;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.pt-add-task-btn {
  background: transparent;
  border: 1.5px solid var(--border2);
  color: var(--muted);
  font-size: 0.8rem;
  font-weight: 700;
  border-radius: 0.4rem;
  padding: 0.2rem 0.55rem;
  cursor: pointer;
  font-family: inherit;
  min-height: 1.9rem;
}
.pt-add-task-btn:active { background: var(--card2); color: var(--text); }

.pt-task-row {
  display: flex;
  align-items: flex-start;
  gap: 0.55rem;
  padding: 0.3rem 0;
  min-height: 2.4rem;
}
.pt-task-cb {
  width: 1.6rem;
  height: 1.6rem;
  min-width: 1.6rem;
  border: 2px solid #4b5563;
  border-radius: 0.35rem;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  cursor: pointer;
  margin-top: 0.15rem;
  background: transparent;
  transition: background 0.1s, border-color 0.1s;
}
.pt-task-cb:active {
  background: rgba(34, 197, 94, 0.12);
  border-color: var(--success);
}
.pt-task-cb.done {
  background: var(--success);
  border-color: var(--success);
}
.pt-task-cb.done::after {
  content: '';
  width: 0.35rem;
  height: 0.65rem;
  border: solid #000;
  border-width: 0 0.17rem 0.17rem 0;
  transform: rotate(45deg);
  margin-bottom: 0.1rem;
}
.pt-task-text {
  flex: 1;
  font-size: 0.95rem;
  line-height: 1.35;
  word-break: break-word;
  color: var(--text);
  cursor: text;
  padding: 0.15rem 0.1rem;
}
.pt-task-text.done {
  text-decoration: line-through;
  color: var(--muted);
}
.pt-task-edit {
  flex: 1;
  background: rgba(0, 0, 0, 0.35);
  border: 1.5px solid var(--success);
  border-radius: 0.4rem;
  padding: 0.3rem 0.5rem;
  color: var(--text);
  font-family: inherit;
  font-size: 0.95rem;
  line-height: 1.35;
  outline: none;
  resize: none;
  overflow: hidden;
  width: 100%;
}
.pt-task-del {
  width: 1.9rem;
  height: 1.9rem;
  min-width: 1.9rem;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 0.35rem;
  cursor: pointer;
  color: var(--muted);
  font-size: 1.2rem;
  opacity: 0.5;
  flex-shrink: 0;
}
.pt-task-del:active {
  background: rgba(239, 68, 68, 0.2);
  color: var(--danger);
  opacity: 1;
}
.pt-task-add-row {
  display: flex;
  gap: 0.4rem;
  margin-top: 0.4rem;
}
.pt-task-add-input {
  flex: 1;
  background: var(--bg);
  border: 1.5px solid var(--border2);
  border-radius: 0.5rem;
  padding: 0 0.75rem;
  color: var(--text);
  font-family: inherit;
  font-size: 0.95rem;
  outline: none;
  min-height: 2.5rem;
}
.pt-task-add-input:focus { border-color: var(--success); }
.pt-no-tasks {
  font-size: 0.9rem;
  color: var(--muted);
  font-style: italic;
  padding: 0.2rem 0;
}

/* ═══════════════════════════════════════════════════════════════
   BADGES
   ═══════════════════════════════════════════════════════════════ */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 0.22rem 0.6rem;
  border-radius: 1rem;
  font-size: 0.85rem;
  font-weight: 700;
  white-space: nowrap;
}
.badge-room {
  background: rgba(239, 68, 68, 0.08);
  border: 1.5px solid var(--danger);
  color: var(--danger);
  padding: 0.2rem 0.55rem;
  border-radius: 0.9rem;
  font-weight: 700;
  font-size: 0.85rem;
}
.badge-mrn {
  background: rgba(16, 185, 129, 0.08);
  border: 1.5px solid #10b981;
  color: #10b981;
  padding: 0.2rem 0.55rem;
  border-radius: 0.9rem;
  font-weight: 700;
  font-size: 0.85rem;
}

/* Priority scale: red → purple → blue → cyan → slate → green */
.p-blank       { display: none; }
.p-critical    { background: #7f1d1d; color: #fff; }
.p-high        { background: #ef4444; color: #fff; }
.p-high-medium { background: #a855f7; color: #fff; }
.p-medium      { background: #3b82f6; color: #fff; }
.p-medium-low  { background: #06b6d4; color: #000; }
.p-low         { background: #64748b; color: #fff; }
.p-complete    { background: #22c55e; color: #000; }

.dot-blank       { background: transparent; }
.dot-critical    { background: #7f1d1d; }
.dot-high        { background: #ef4444; }
.dot-high-medium { background: #a855f7; }
.dot-medium      { background: #3b82f6; }
.dot-medium-low  { background: #06b6d4; }
.dot-low         { background: #64748b; }
.dot-complete    { background: #22c55e; }

/* ═══════════════════════════════════════════════════════════════
   DETAIL VIEW
   ═══════════════════════════════════════════════════════════════ */
#detailView { background: var(--bg); }
.pt-hdr {
  padding: 0.85rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}
.pt-hdr-name {
  font-size: 1.4rem;
  font-weight: 700;
  color: #60a5fa;
  line-height: 1.2;
  margin-bottom: 0.55rem;
  word-break: break-word;
}
.pt-hdr-pos {
  font-size: 0.8rem;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 0.45rem;
}
.pt-hdr-badges { display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; }

.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.tab {
  padding: 0 1.3rem;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  color: var(--muted);
  white-space: nowrap;
  flex-shrink: 0;
  min-height: var(--tap);
  display: flex;
  align-items: center;
}
.tab.on {
  color: var(--primary);
  border-bottom-color: var(--primary);
  font-weight: 700;
}
.tab:active { background: var(--card); }

.tab-pane {
  flex: 1;
  overflow-y: auto;
  padding: 0.85rem;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

/* ═══════════════════════════════════════════════════════════════
   FORMS
   ═══════════════════════════════════════════════════════════════ */
.fg { margin-bottom: 1rem; }
.fl {
  font-size: 0.75rem;
  font-weight: 800;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.4rem;
}
.fi {
  width: 100%;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 0.7rem;
  padding: 0.75rem 0.9rem;
  color: var(--text);
  font-size: 1rem;
  font-family: inherit;
  line-height: 1.4;
  -webkit-appearance: none;
  min-height: var(--tap);
}
.fi:focus { outline: none; border-color: var(--primary); }
textarea.fi { resize: none; overflow: hidden; min-height: var(--tap); }
select.fi { cursor: pointer; }
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; }
@media (max-width: 380px) { .g2 { grid-template-columns: 1fr; } }

.save-bar { margin-top: 0.5rem; padding-bottom: 1rem; }
.save-bar .btn { width: 100%; font-size: 1rem; min-height: var(--tap); }

.ph {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 0.85rem;
  padding: 1.5rem 1rem;
  text-align: center;
  color: var(--muted);
  font-size: 1rem;
  line-height: 1.6;
}
.ph strong {
  display: block;
  color: var(--text);
  margin-bottom: 0.4rem;
  font-size: 1.15rem;
}

#fName { color: #60a5fa; font-weight: 700; }
#fRoom { color: var(--danger); font-weight: 700; }
#fMRN { color: #10b981; font-weight: 700; }

/* ═══════════════════════════════════════════════════════════════
   BOTTOM NAV — PREV | NEXT | LIST | DELETE
   ═══════════════════════════════════════════════════════════════ */
.detail-nav {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 0.4rem;
  padding: 0.55rem 0.65rem;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  padding-bottom: max(0.55rem, env(safe-area-inset-bottom));
}
.nav-btn {
  background: var(--card);
  border: 1.5px solid var(--border);
  color: var(--text);
  border-radius: 0.7rem;
  padding: 0 0.3rem;
  font-size: 0.9rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  min-height: var(--tap-lg);
  line-height: 1.1;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s, border-color 0.1s;
}
.nav-btn-red {
  background: rgba(239, 68, 68, 0.12);
  border-color: rgba(239, 68, 68, 0.45);
  color: var(--danger);
}
.nav-btn:disabled { opacity: 0.28; cursor: not-allowed; }
.nav-btn:not(:disabled):active { background: var(--card2); border-color: var(--border2); }
.nav-btn-red:not(:disabled):active { background: rgba(239, 68, 68, 0.22); }

/* ═══════════════════════════════════════════════════════════════
   TODO WIDGET (detail view)
   ═══════════════════════════════════════════════════════════════ */
.todo-wrap {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 0.7rem;
  padding: 0.7rem;
}
.todo-list { display: flex; flex-direction: column; margin-bottom: 0.5rem; }
.todo-item {
  display: flex;
  align-items: flex-start;
  gap: 0.55rem;
  padding: 0.35rem 0.2rem;
  border-radius: 0.45rem;
  min-height: 2.8rem;
}
.todo-item.completed { opacity: 0.55; }
.todo-item.completed .todo-text {
  text-decoration: line-through;
  color: var(--muted);
}
.todo-cb {
  width: 2.15rem;
  height: 2.15rem;
  min-width: 2.15rem;
  border: 2.5px solid #4b5563;
  border-radius: 0.5rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  flex-shrink: 0;
  margin-top: 0.1rem;
  transition: background 0.1s, border-color 0.1s;
}
.todo-cb:active {
  border-color: var(--success);
  background: rgba(34, 197, 94, 0.12);
}
.todo-cb.checked {
  background: var(--success);
  border-color: var(--success);
}
.todo-cb.checked::after {
  content: '';
  width: 0.45rem;
  height: 0.8rem;
  border: solid #000;
  border-width: 0 0.17rem 0.17rem 0;
  transform: rotate(45deg);
  margin-bottom: 0.1rem;
}
.todo-text {
  flex: 1;
  font-size: 1rem;
  line-height: 1.45;
  color: var(--text);
  word-break: break-word;
  cursor: text;
  padding: 0.3rem 0.1rem;
}
.todo-edit {
  flex: 1;
  background: rgba(0, 0, 0, 0.35);
  border: 1.5px solid var(--success);
  border-radius: 0.45rem;
  padding: 0.4rem 0.55rem;
  color: var(--text);
  font-family: inherit;
  font-size: 1rem;
  line-height: 1.45;
  outline: none;
  resize: none;
  overflow: hidden;
  width: 100%;
}
.todo-del {
  width: 2.15rem;
  height: 2.15rem;
  min-width: 2.15rem;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 0.4rem;
  cursor: pointer;
  color: var(--muted);
  font-size: 1.3rem;
  opacity: 0.5;
  flex-shrink: 0;
}
.todo-del:active {
  background: rgba(239, 68, 68, 0.2);
  color: var(--danger);
  opacity: 1;
}
.todo-add-row { display: flex; gap: 0.45rem; margin-top: 0.3rem; }
.todo-add-input {
  flex: 1;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 0.55rem;
  padding: 0 0.85rem;
  color: var(--text);
  font-family: inherit;
  font-size: 1rem;
  outline: none;
  min-height: var(--tap);
}
.todo-add-input:focus { border-color: var(--success); }
.todo-add-input::placeholder { color: rgba(148, 163, 184, 0.5); font-style: italic; }

/* ═══════════════════════════════════════════════════════════════
   MODALS
   ═══════════════════════════════════════════════════════════════ */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.82);
  z-index: 500;
  display: flex;
  align-items: flex-end;
  padding: 0;
}
@media (min-width: 520px) {
  .overlay { align-items: center; padding: 1rem; }
}
.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 1.1rem 1.1rem 0 0;
  width: 100%;
  max-height: 92vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding-bottom: env(safe-area-inset-bottom);
}
@media (min-width: 520px) {
  .modal {
    border-radius: 1rem;
    max-width: 30rem;
    margin: auto;
    max-height: 90vh;
  }
}
.modal-hdr {
  padding: 1rem 1.15rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-weight: 800;
  font-size: 1.15rem;
  flex-shrink: 0;
  gap: 0.5rem;
}
.modal-body {
  padding: 0.85rem;
  overflow-y: auto;
  flex: 1;
  -webkit-overflow-scrolling: touch;
}
.modal-ftr {
  padding: 0.75rem 0.85rem;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 0.55rem;
  justify-content: flex-end;
  flex-shrink: 0;
}
.x-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 1.8rem;
  cursor: pointer;
  line-height: 1;
  padding: 0;
  font-family: inherit;
  min-width: var(--tap);
  min-height: var(--tap);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* Priority picker */
.pri-grid { display: flex; flex-direction: column; gap: 0.55rem; }
.pri-option {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 0.8rem;
  padding: 0.75rem 0.9rem;
  cursor: pointer;
  min-height: var(--tap);
}
.pri-option:active { background: var(--card2); }
.pri-option.selected { border-color: var(--primary); }
.pri-swatch {
  width: 1.8rem;
  height: 1.8rem;
  border-radius: 50%;
  flex-shrink: 0;
  border: 2px solid rgba(255, 255, 255, 0.08);
}
.pri-label { font-size: 1rem; font-weight: 700; flex: 1; }
.pri-check { color: var(--primary); font-size: 1.25rem; font-weight: 800; opacity: 0; }
.pri-option.selected .pri-check { opacity: 1; }

/* ═══════════════════════════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════════════════════════ */
.toast {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  bottom: max(1.5rem, calc(env(safe-area-inset-bottom) + 1rem));
  background: #262626;
  border: 1.5px solid var(--border2);
  border-radius: 0.75rem;
  padding: 0.75rem 1.3rem;
  font-size: 1rem;
  font-weight: 600;
  z-index: 600;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.25s;
  white-space: nowrap;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- ═══════════════ HEADER ═══════════════ -->
<div class="hdr">
  <div class="hdr-left">
    <h1>MedList</h1>
    <span class="census" id="censusLabel"></span>
  </div>
  <button class="btn btn-blue btn-sm" id="addBtn" onclick="openAdd()">+ Patient</button>
</div>

<!-- ═══════════════ LIST VIEW ═══════════════ -->
<div class="view" id="listView">
  <div class="toolbar">
    <input class="search" id="searchInput" type="search" placeholder="Search name, room, MRN…" oninput="renderList()" autocomplete="off">
    <button class="sort-btn" id="sortBtn" onclick="cycleSort()">Sort ▾</button>
  </div>
  <div class="pt-list" id="ptList">
    <div style="padding: 2.5rem; text-align: center; color: var(--muted);">Loading…</div>
  </div>
</div>

<!-- ═══════════════ DETAIL VIEW ═══════════════ -->
<div class="view hidden" id="detailView">
  <div class="pt-hdr">
    <div class="pt-hdr-pos" id="dhPos"></div>
    <div class="pt-hdr-name" id="dhName"></div>
    <div class="pt-hdr-badges">
      <span class="badge-room" id="dhRoom"></span>

      <span class="badge" id="dhPri"></span>
    </div>
  </div>

  <div class="tabs">
    <div class="tab on" id="t-details" onclick="goTab('details')">Details</div>
    <div class="tab" id="t-vitals" onclick="goTab('vitals')">Vitals / Labs</div>
    <div class="tab" id="t-orders" onclick="goTab('orders')">Orders</div>
  </div>

  <div class="tab-pane" id="p-details">
    <div class="g2">
      <div class="fg"><div class="fl">Name</div><input class="fi" id="fName" type="text" placeholder="Last, First" autocomplete="off"></div>
      <div class="fg"><div class="fl">Priority</div>
        <select class="fi" id="fPri">
          <option value="">— None —</option>
          <option value="Critical">Critical</option>
          <option value="High">High</option>
          <option value="High Medium">High Medium</option>
          <option value="Medium">Medium</option>
          <option value="Medium Low">Medium Low</option>
          <option value="Low">Low</option>
          <option value="Complete">Complete</option>
        </select>
      </div>
    </div>
    <div class="g2">
      <div class="fg"><div class="fl">Room</div><input class="fi" id="fRoom" type="text" placeholder="5NE-531" autocomplete="off"></div>
      <div class="fg"><div class="fl">MRN</div><input class="fi" id="fMRN" type="text" autocomplete="off"></div>
    </div>
    <div class="fg">
      <div class="fl">ICS / Team</div>
      <textarea class="fi" id="fICS" placeholder="ICS / Team details…" oninput="autoGrow(this)"></textarea>

    <div class="fg">
      <div class="fl">Problems / Diagnoses</div>
      <textarea class="fi" id="fProblems" placeholder="Problems / Diagnoses…" oninput="autoGrow(this)"></textarea>
    </div>
    <div class="fg">
      <div class="fl">To Do</div>
      <div class="todo-wrap" id="todoContainer"></div>
    </div>
    <div class="save-bar"><button class="btn btn-blue" onclick="saveDetails()">Save Details</button></div>
  </div>

  <div class="tab-pane hidden" id="p-vitals">
    <div class="ph"><strong>Vitals &amp; Labs</strong>Cerner import and manual entry coming in the next update.</div>
  </div>

  <div class="tab-pane hidden" id="p-orders">
    <div class="fg"><div class="fl">Active Medications &amp; Orders</div><textarea class="fi" id="fActiveMeds" oninput="autoGrow(this)"></textarea></div>
    <div class="fg"><div class="fl">Home Medications</div><textarea class="fi" id="fHomeMeds" oninput="autoGrow(this)"></textarea></div>
    <div class="save-bar"><button class="btn btn-blue" onclick="saveOrders()">Save Orders</button></div>
  </div>

  <div class="detail-nav">
    <button class="nav-btn" id="prevBtn" onclick="prevPt()">← Prev</button>
    <button class="nav-btn" id="nextBtn" onclick="nextPt()">Next →</button>
    <button class="nav-btn" onclick="goBack()">List</button>
    <button class="nav-btn nav-btn-red" onclick="confirmDelete()">Delete</button>
  </div>
</div>

<!-- ═══════════════ ADD PATIENT MODAL ═══════════════ -->
<div class="overlay hidden" id="addModal">
  <div class="modal">
    <div class="modal-hdr">Add Patient <button class="x-btn" onclick="closeAdd()">&times;</button></div>
    <div class="modal-body">
      <div class="g2">
        <div class="fg"><div class="fl">Name *</div><input class="fi" id="mName" type="text" placeholder="Last, First" autocomplete="off"></div>
        <div class="fg"><div class="fl">Priority</div>
          <select class="fi" id="mPri">
            <option value="">— None —</option>
            <option value="Critical">Critical</option>
            <option value="High">High</option>
            <option value="High Medium">High Medium</option>
            <option value="Medium" selected>Medium</option>
            <option value="Medium Low">Medium Low</option>
            <option value="Low">Low</option>
            <option value="Complete">Complete</option>
          </select>
        </div>
      </div>
      <div class="g2">
        <div class="fg"><div class="fl">Room</div><input class="fi" id="mRoom" type="text" placeholder="5NE-531" autocomplete="off"></div>
        <div class="fg"><div class="fl">MRN</div><input class="fi" id="mMRN" type="text" autocomplete="off"></div>
      </div>
      <div class="fg"><div class="fl">ICS / Attending</div><input class="fi" id="mICS" type="text" autocomplete="off"></div>
      <div class="fg"><div class="fl">Problems</div><textarea class="fi" id="mProblems" rows="3" oninput="autoGrow(this)"></textarea></div>
    </div>
    <div class="modal-ftr">
      <button class="btn btn-ghost" onclick="closeAdd()">Cancel</button>
      <button class="btn btn-blue" onclick="submitAdd()">Add</button>
    </div>
  </div>
</div>

<!-- ═══════════════ PRIORITY PICKER MODAL ═══════════════ -->
<div class="overlay hidden" id="priModal">
  <div class="modal">
    <div class="modal-hdr">
      <span style="min-width:0; overflow:hidden; text-overflow:ellipsis;">Priority — <span id="priModalName" style="color:#60a5fa;"></span></span>
      <button class="x-btn" onclick="closePriPicker()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="pri-grid" id="priGrid"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════════ */
var patients = [];       // ← always kept in INSERTION order (no mutation by sort)
var curId = null;
var sortMode = 0;
var SORT_LABELS = ['Sort ▾', 'Priority ▴', 'Name ▴', 'Room ▴'];

var PRI_LIST = [
  { key: 'Critical',    cls: 'p-critical',    dot: 'dot-critical'    },
  { key: 'High',        cls: 'p-high',        dot: 'dot-high'        },
  { key: 'High Medium', cls: 'p-high-medium', dot: 'dot-high-medium' },
  { key: 'Medium',      cls: 'p-medium',      dot: 'dot-medium'      },
  { key: 'Medium Low',  cls: 'p-medium-low',  dot: 'dot-medium-low'  },
  { key: 'Low',         cls: 'p-low',         dot: 'dot-low'         },
  { key: 'Complete',    cls: 'p-complete',    dot: 'dot-complete'    },
  { key: '',            cls: 'p-blank',       dot: 'dot-blank'       }
];
var PRI_CLASS = {}, DOT_CLASS = {}, PRI_ORDER = {};
PRI_LIST.forEach(function(p, i) {
  PRI_CLASS[p.key.toLowerCase()] = p.cls;
  DOT_CLASS[p.key.toLowerCase()] = p.dot;
  PRI_ORDER[p.key.toLowerCase()] = i;
});
function priClass(p) { return PRI_CLASS[(p || '').toLowerCase()] || 'p-blank'; }
function dotClass(p) { return DOT_CLASS[(p || '').toLowerCase()] || 'dot-blank'; }
function priAbbr(p) {
  var m = {
    'Critical': 'CRIT', 'High': 'HIGH', 'High Medium': 'H-MED',
    'Medium': 'MED', 'Medium Low': 'M-LOW', 'Low': 'LOW', 'Complete': '✓'
  };
  return m[p] || '';
}

function autoGrow(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

/* ═══════════════════════════════════════════════════════════════
   SORT (view-only; never mutates `patients` itself)
   ═══════════════════════════════════════════════════════════════ */
function cycleSort() {
  sortMode = (sortMode + 1) % SORT_LABELS.length;
  var btn = document.getElementById('sortBtn');
  btn.textContent = SORT_LABELS[sortMode];
  btn.classList.toggle('active', sortMode !== 0);
  renderList();
}
function applySort(list) {
  if (sortMode === 1) {
    list.sort(function(a, b) {
      var pa = PRI_ORDER[(a.Priority || '').toLowerCase()]; if (pa === undefined) pa = 99;
      var pb = PRI_ORDER[(b.Priority || '').toLowerCase()]; if (pb === undefined) pb = 99;
      return pa - pb;
    });
  } else if (sortMode === 2) {
    list.sort(function(a, b) { return (a.Name || '').localeCompare(b.Name || ''); });
  } else if (sortMode === 3) {
    list.sort(function(a, b) { return (a.Room || '').localeCompare(b.Room || ''); });
  }
  return list;
}
function getFilteredSorted() {
  var q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  var list = patients.slice();
  if (q) {
    list = list.filter(function(p) {
      return (p.Name || '').toLowerCase().indexOf(q) !== -1 ||
             (p.Room || '').toLowerCase().indexOf(q) !== -1 ||
             (p.MRN  || '').toLowerCase().indexOf(q) !== -1;
    });
  }
  return applySort(list);
}

/* ═══════════════════════════════════════════════════════════════
   BOOT
   ═══════════════════════════════════════════════════════════════ */
window.addEventListener('load', function() {
  document.getElementById('addModal').addEventListener('click', function(e) {
    if (e.target === this) closeAdd();
  });
  document.getElementById('priModal').addEventListener('click', function(e) {
    if (e.target === this) closePriPicker();
  });

  if (typeof google !== 'undefined' && google.script && google.script.run) {
    google.script.run
      .withSuccessHandler(function(data) { patients = data || []; renderList(); })
      .withFailureHandler(function(e) {
        document.getElementById('ptList').innerHTML =
          '<div style="padding: 2.5rem; text-align: center; color: var(--muted);">Error: ' + e.message + '</div>';
      })
      .getPatients();
  } else {
    // Demo data when running outside Apps Script
    patients = [];
    renderList();
  }
});

/* ═══════════════════════════════════════════════════════════════
   CARD RENDER (with fully interactive tasks)
   ═══════════════════════════════════════════════════════════════ */
function renderList() {
  var el = document.getElementById('ptList');
  var list = getFilteredSorted();
  var n = patients.length;
  document.getElementById('censusLabel').textContent = n + (n === 1 ? ' patient' : ' patients');

  if (!n) {
    el.innerHTML = '<div style="padding: 3rem 1rem; text-align: center; color: var(--muted);">No patients — tap <strong style="color: var(--text);">+ Patient</strong> to add</div>';
    return;
  }
  if (!list.length) {
    el.innerHTML = '<div style="padding: 3rem 1rem; text-align: center; color: var(--muted);">No patients match your search</div>';
    return;
  }

  el.innerHTML = '';
  list.forEach(function(p) {
    el.appendChild(buildPatientCard(p));
  });
}

function buildPatientCard(p) {
  var pri = p.Priority || '';
  var card = document.createElement('div');
  card.className = 'pt-card';

  /* Top row: dot + info + chevron */
  var top = document.createElement('div');
  top.className = 'pt-top';
  top.addEventListener('click', function(e) {
    // If user clicked inside the dot, skip open
    if (e.target.closest('.pt-dot-btn')) return;
    selectPt(p.ID);
  });

  var dot = document.createElement('div');
  dot.className = 'pt-dot-btn ' + dotClass(pri) + (pri ? '' : ' pt-dot-blank');
  dot.innerHTML = pri ? '<span class="pt-dot-label">' + esc(priAbbr(pri)) + '</span>' : '';
  dot.title = 'Tap to change priority';
  dot.addEventListener('click', function(e) {
    e.stopPropagation();
    openPriPicker(p.ID);
  });
  top.appendChild(dot);

  var info = document.createElement('div');
  info.className = 'pt-info';
  info.innerHTML =
    '<div class="pt-name">' + esc(p.Name || '—') + '</div>' +
    '<div class="pt-meta">' +
      (p.Room ? '<span class="badge-room">' + esc(p.Room) + '</span>' : '') +
      (p.MRN  ? '<span class="badge-mrn">MRN ' + esc(p.MRN) + '</span>' : '') +
      (pri    ? '<span class="badge ' + priClass(pri) + '">' + esc(pri) + '</span>' : '') +
    '</div>';
  top.appendChild(info);

  var chev = document.createElement('div');
  chev.className = 'pt-chevron';
  chev.innerHTML = '›';
  top.appendChild(chev);

  card.appendChild(top);

  /* Tasks section — fully interactive, doesn't trigger card open */
  var tasksSection = document.createElement('div');
  tasksSection.className = 'pt-tasks';
  tasksSection.addEventListener('click', function(e) { e.stopPropagation(); });
  buildCardTasks(tasksSection, p);
  card.appendChild(tasksSection);

  return card;
}

function buildCardTasks(container, p) {
  container.innerHTML = '';
  var parsed = parseTodo(p.ToDo);

  var hdr = document.createElement('div');
  hdr.className = 'pt-tasks-hdr';
  hdr.innerHTML = '<div class="pt-tasks-title">Tasks</div>';
  var addToggle = document.createElement('button');
  addToggle.className = 'pt-add-task-btn';
  addToggle.textContent = '+ Add';
  addToggle.addEventListener('click', function(e) {
    e.stopPropagation();
    showCardAddRow(container, p, parsed);
  });
  hdr.appendChild(addToggle);
  container.appendChild(hdr);

  var tasks = parsed.tasks.filter(function(t) { return t.type === 'task'; });

  if (!tasks.length) {
    var empty = document.createElement('div');
    empty.className = 'pt-no-tasks';
    empty.textContent = 'No tasks';
    container.appendChild(empty);
    return;
  }

  tasks.forEach(function(task) {
    var row = document.createElement('div');
    row.className = 'pt-task-row';

    var cb = document.createElement('div');
    cb.className = 'pt-task-cb' + (task.done ? ' done' : '');
    cb.addEventListener('click', function(e) {
      e.stopPropagation();
      task.done = !task.done;
      saveTodoForPatient(p, parsed);
    });
    row.appendChild(cb);

    var text = document.createElement('span');
    text.className = 'pt-task-text' + (task.done ? ' done' : '');
    text.textContent = task.text;
    text.addEventListener('click', function(e) {
      e.stopPropagation();
      startCardTaskEdit(row, text, task, p, parsed);
    });
    row.appendChild(text);

    var del = document.createElement('div');
    del.className = 'pt-task-del';
    del.innerHTML = '&times;';
    del.title = 'Delete';
    del.addEventListener('click', function(e) {
      e.stopPropagation();
      var idx = parsed.tasks.indexOf(task);
      if (idx !== -1) parsed.tasks.splice(idx, 1);
      saveTodoForPatient(p, parsed);
    });
    row.appendChild(del);

    container.appendChild(row);
  });
}

function startCardTaskEdit(row, textEl, task, p, parsed) {
  var inp = document.createElement('textarea');
  inp.className = 'pt-task-edit';
  inp.value = task.text;
  inp.rows = 1;
  function resize() { inp.style.height = 'auto'; inp.style.height = inp.scrollHeight + 'px'; }
  inp.addEventListener('input', resize);
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      task.text = this.value.trim() || task.text;
      saveTodoForPatient(p, parsed);
    } else if (e.key === 'Escape') {
      renderList();
    }
  });
  inp.addEventListener('blur', function() {
    task.text = this.value.trim() || task.text;
    saveTodoForPatient(p, parsed);
  });
  textEl.replaceWith(inp);
  inp.focus();
  inp.select();
  resize();
}

function showCardAddRow(container, p, parsed) {
  // Remove any existing add row
  var existing = container.querySelector('.pt-task-add-row');
  if (existing) { existing.querySelector('input').focus(); return; }

  var row = document.createElement('div');
  row.className = 'pt-task-add-row';
  var inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'pt-task-add-input';
  inp.placeholder = 'New task… (Enter to add)';
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && this.value.trim()) {
      e.preventDefault();
      parsed.tasks.push({ type: 'task', text: this.value.trim(), done: false });
      saveTodoForPatient(p, parsed);
    } else if (e.key === 'Escape') {
      row.remove();
    }
  });
  inp.addEventListener('blur', function() {
    if (!this.value.trim()) row.remove();
  });
  row.appendChild(inp);
  container.appendChild(row);
  setTimeout(function() { inp.focus(); }, 50);
}

function saveTodoForPatient(p, parsed) {
  p.ToDo = serializeTodo(parsed.tasks);
  if (typeof google !== 'undefined' && google.script && google.script.run) {
    google.script.run
      .withSuccessHandler(function() { renderList(); })
      .withFailureHandler(function(err) { toast('Error: ' + err.message); renderList(); })
      .savePatient(p);
  } else {
    renderList();
  }
}

/* ═══════════════════════════════════════════════════════════════
   PRIORITY PICKER (tap dot on main list)
   ═══════════════════════════════════════════════════════════════ */
var priPickerId = null;
function openPriPicker(id) {
  priPickerId = String(id);
  var p = findPt(id); if (!p) return;
  document.getElementById('priModalName').textContent = p.Name || '—';
  var grid = document.getElementById('priGrid');
  var current = (p.Priority || '').toLowerCase();
  grid.innerHTML = '';

  var options = PRI_LIST.slice().sort(function(a, b) {
    if (a.key === '') return 1;
    if (b.key === '') return -1;
    return 0;
  });
  options.forEach(function(opt) {
    var selected = current === opt.key.toLowerCase();
    var row = document.createElement('div');
    row.className = 'pri-option' + (selected ? ' selected' : '');
    row.innerHTML =
      '<div class="pri-swatch ' + opt.dot + (opt.key === '' ? ' pt-dot-blank' : '') + '"></div>' +
      '<div class="pri-label">' + (opt.key || 'None') + '</div>' +
      '<div class="pri-check">✓</div>';
    row.addEventListener('click', function() { setPriority(priPickerId, opt.key); });
    grid.appendChild(row);
  });

  document.getElementById('priModal').classList.remove('hidden');
}
function closePriPicker() {
  document.getElementById('priModal').classList.add('hidden');
  priPickerId = null;
}
function setPriority(id, newPri) {
  var p = findPt(id);
  if (!p) { closePriPicker(); return; }
  p.Priority = newPri;

  function onSaved() {
    closePriPicker();
    renderList();
    if (String(curId) === String(id)) {
      refreshDetailHeader(p);
      document.getElementById('fPri').value = newPri || '';
    }
    toast('Priority updated');
  }

  if (typeof google !== 'undefined' && google.script && google.script.run) {
    google.script.run
      .withSuccessHandler(onSaved)
      .withFailureHandler(function(e) { toast('Error: ' + e.message); })
      .savePatient(p);
  } else {
    onSaved();
  }
}

/* ═══════════════════════════════════════════════════════════════
   NAVIGATION — PREV/NEXT FOLLOWS INSERTION ORDER
   (patients array is never mutated by sort, so 1 → 2 → 3 is stable)
   ═══════════════════════════════════════════════════════════════ */
function selectPt(id) {
  var p = findPt(id);
  if (!p) return;
  curId = String(id);
  showDetail(p);
}

function showDetail(p) {
  document.getElementById('listView').classList.add('hidden');
  document.getElementById('detailView').classList.remove('hidden');
  document.getElementById('addBtn').classList.add('hidden');

  refreshDetailHeader(p);

  sv('fName', p.Name);
  sv('fPri', p.Priority || '');
  sv('fRoom', p.Room);
  sv('fMRN', p.MRN);
  sv('fICS', p.ICS);
  sv('fProblems', p.Problems);
  sv('fActiveMeds', p.ActiveMeds);
  sv('fHomeMeds', p.HomeMeds);

  setTimeout(function() {
    ['fICS', 'fProblems', 'fActiveMeds', 'fHomeMeds'].forEach(function(fid) {
      var ta = document.getElementById(fid);
      if (ta) autoGrow(ta);
    });
  }, 50);

  renderDetailTodo(document.getElementById('todoContainer'), p);
  goTab('details');
  updateNavBtns();
  document.getElementById('p-details').scrollTop = 0;
}

function refreshDetailHeader(p) {
  var pri = p.Priority || '';
  var idx = indexOfPatient(p.ID);
  document.getElementById('dhPos').textContent =
    'Patient ' + (idx + 1) + ' of ' + patients.length;
  document.getElementById('dhName').textContent = p.Name || '—';

  var roomEl = document.getElementById('dhRoom');
  var mrnEl  = document.getElementById('dhMRN');
  roomEl.textContent = p.Room || '';
  roomEl.style.display = p.Room ? '' : 'none';
  mrnEl.textContent = p.MRN ? 'MRN ' + p.MRN : '';
  mrnEl.style.display = p.MRN ? '' : 'none';

  var pb = document.getElementById('dhPri');
  pb.textContent = pri;
  pb.className = 'badge ' + priClass(pri);
  pb.style.display = pri ? '' : 'none';
}

function goBack() {
  document.getElementById('detailView').classList.add('hidden');
  document.getElementById('listView').classList.remove('hidden');
  document.getElementById('addBtn').classList.remove('hidden');
  renderList();
}

function prevPt() {
  var idx = indexOfPatient(curId);
  if (idx > 0) {
    curId = String(patients[idx - 1].ID);
    showDetail(patients[idx - 1]);
  }
}
function nextPt() {
  var idx = indexOfPatient(curId);
  if (idx !== -1 && idx < patients.length - 1) {
    curId = String(patients[idx + 1].ID);
    showDetail(patients[idx + 1]);
  }
}
function indexOfPatient(id) {
  for (var i = 0; i < patients.length; i++) {
    if (String(patients[i].ID) === String(id)) return i;
  }
  return -1;
}
function updateNavBtns() {
  var idx = indexOfPatient(curId);
  document.getElementById('prevBtn').disabled = (idx <= 0);
  document.getElementById('nextBtn').disabled = (idx === -1 || idx >= patients.length - 1);
}

/* ═══════════════════════════════════════════════════════════════
   TABS
   ═══════════════════════════════════════════════════════════════ */
function goTab(name) {
  var names = ['details', 'vitals', 'orders'];
  names.forEach(function(n) {
    document.getElementById('t-' + n).className = 'tab' + (n === name ? ' on' : '');
    document.getElementById('p-' + n).className = 'tab-pane' + (n === name ? '' : ' hidden');
  });
}

/* ═══════════════════════════════════════════════════════════════
   SAVE / DELETE
   ═══════════════════════════════════════════════════════════════ */
function saveDetails() {
  var p = findPt(curId); if (!p) return;
  p.Name = gv('fName');
  p.Priority = gv('fPri');
  p.Room = gv('fRoom');
  p.MRN = gv('fMRN');
  p.ICS = gv('fICS');
  p.Problems = gv('fProblems');
  runSave(p, function() { showDetail(p); toast('Saved'); });
}

function saveOrders() {
  var p = findPt(curId); if (!p) return;
  p.ActiveMeds = gv('fActiveMeds');
  p.HomeMeds = gv('fHomeMeds');
  runSave(p, function() { toast('Orders saved'); });
}

function runSave(p, onOk) {
  if (typeof google !== 'undefined' && google.script && google.script.run) {
    google.script.run
      .withSuccessHandler(onOk)
      .withFailureHandler(function(e) { toast('Error: ' + e.message); })
      .savePatient(p);
  } else {
    onOk();
  }
}

function confirmDelete() {
  var p = findPt(curId); if (!p) return;
  if (!confirm('Delete ' + (p.Name || 'patient') + '?')) return;
  var id = curId;

  function after() {
    patients = patients.filter(function(x) { return String(x.ID) !== String(id); });
    curId = null;
    goBack();
    toast('Deleted');
  }

  if (typeof google !== 'undefined' && google.script && google.script.run) {
    google.script.run
      .withSuccessHandler(after)
      .withFailureHandler(function(e) { toast('Error: ' + e.message); })
      .deletePatient(id);
  } else {
    after();
  }
}

/* ═══════════════════════════════════════════════════════════════
   ADD MODAL
   ═══════════════════════════════════════════════════════════════ */
function openAdd() {
  ['mName', 'mRoom', 'mMRN', 'mICS', 'mProblems'].forEach(function(id) {
    document.getElementById(id).value = '';
  });
  document.getElementById('mPri').value = 'Medium';
  document.getElementById('addModal').classList.remove('hidden');
  setTimeout(function() { document.getElementById('mName').focus(); }, 200);
}
function closeAdd() { document.getElementById('addModal').classList.add('hidden'); }

function submitAdd() {
  var name = document.getElementById('mName').value.trim();
  if (!name) { toast('Name is required'); return; }
  var p = {
    Name: name,
    Priority: gv('mPri'),
    Room: gv('mRoom'),
    MRN: gv('mMRN'),
    ICS: gv('mICS'),
    Problems: gv('mProblems'),
    ToDo: '',
    ActiveMeds: '',
    HomeMeds: ''
  };

  function after(newId) {
    p.ID = String(newId || Date.now());
    patients.push(p);
    closeAdd();
    selectPt(p.ID);
    toast('Patient added');
  }

  if (typeof google !== 'undefined' && google.script && google.script.run) {
    google.script.run
      .withSuccessHandler(after)
      .withFailureHandler(function(e) { toast('Failed: ' + e.message); })
      .savePatient(p);
  } else {
    after(Date.now());
  }
}

/* ═══════════════════════════════════════════════════════════════
   DETAIL TODO (in-depth editor)
   ═══════════════════════════════════════════════════════════════ */
function parseTodo(text) {
  if (!text) return { tasks: [] };
  var tasks = [];
  String(text).split('\n').forEach(function(line) {
    if (/^\[x\] /i.test(line))      tasks.push({ type: 'task',  text: line.substring(4), done: true });
    else if (/^\[ \] /.test(line))  tasks.push({ type: 'task',  text: line.substring(4), done: false });
    else if (line.trim())            tasks.push({ type: 'plain', text: line });
  });
  return { tasks: tasks };
}
function serializeTodo(tasks) {
  var plains  = tasks.filter(function(t) { return t.type !== 'task'; });
  var pending = tasks.filter(function(t) { return t.type === 'task' && !t.done; });
  var done    = tasks.filter(function(t) { return t.type === 'task' &&  t.done; });
  return plains.concat(pending).concat(done).map(function(t) {
    return t.type === 'task' ? (t.done ? '[x] ' : '[ ] ') + t.text : t.text;
  }).join('\n');
}

function renderDetailTodo(container, p) {
  if (!container) return;
  container.innerHTML = '';
  var parsed = parseTodo(p.ToDo);

  function persist() {
    p.ToDo = serializeTodo(parsed.tasks);
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run
        .withSuccessHandler(function() {})
        .withFailureHandler(function(e) { toast('Save error: ' + e.message); })
        .savePatient(p);
    }
  }
  function startEdit(item, textEl) {
    var inp = document.createElement('textarea');
    inp.className = 'todo-edit';
    inp.value = item.text;
    inp.rows = 1;
    function resize() { inp.style.height = 'auto'; inp.style.height = inp.scrollHeight + 'px'; }
    inp.addEventListener('input', resize);
    inp.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        item.text = this.value.trim() || item.text;
        persist();
        renderDetailTodo(container, p);
      } else if (e.key === 'Escape') {
        renderDetailTodo(container, p);
      }
    });
    inp.addEventListener('blur', function() {
      item.text = this.value.trim() || item.text;
      persist();
      renderDetailTodo(container, p);
    });
    textEl.replaceWith(inp);
    inp.focus();
    inp.select();
    resize();
  }
  function makeDel(item) {
    var dl = document.createElement('div');
    dl.className = 'todo-del';
    dl.innerHTML = '&times;';
    dl.addEventListener('click', function(e) {
      e.stopPropagation();
      var idx = parsed.tasks.indexOf(item);
      if (idx !== -1) parsed.tasks.splice(idx, 1);
      persist();
      renderDetailTodo(container, p);
    });
    return dl;
  }

  var listEl = document.createElement('div');
  listEl.className = 'todo-list';
  var plains  = parsed.tasks.filter(function(t) { return t.type !== 'task'; });
  var pending = parsed.tasks.filter(function(t) { return t.type === 'task' && !t.done; });
  var done    = parsed.tasks.filter(function(t) { return t.type === 'task' &&  t.done; });

  plains.forEach(function(item) {
    var el = document.createElement('div');
    el.className = 'todo-item';
    var cb = document.createElement('div');
    cb.className = 'todo-cb';
    cb.addEventListener('click', function(e) {
      e.stopPropagation();
      item.type = 'task';
      item.done = false;
      item.text = item.text.replace(/^-\s+/, '');
      persist();
      renderDetailTodo(container, p);
    });
    var tx = document.createElement('span');
    tx.className = 'todo-text';
    tx.style.color = '#94a3b8';
    tx.textContent = item.text;
    tx.addEventListener('click', function(e) { e.stopPropagation(); startEdit(item, tx); });
    el.appendChild(cb);
    el.appendChild(tx);
    el.appendChild(makeDel(item));
    listEl.appendChild(el);
  });

  pending.concat(done).forEach(function(item) {
    var el = document.createElement('div');
    el.className = 'todo-item' + (item.done ? ' completed' : '');
    var cb = document.createElement('div');
    cb.className = 'todo-cb' + (item.done ? ' checked' : '');
    cb.addEventListener('click', function(e) {
      e.stopPropagation();
      item.done = !item.done;
      persist();
      renderDetailTodo(container, p);
    });
    var tx = document.createElement('span');
    tx.className = 'todo-text';
    tx.textContent = item.text;
    tx.addEventListener('click', function(e) { e.stopPropagation(); startEdit(item, tx); });
    el.appendChild(cb);
    el.appendChild(tx);
    el.appendChild(makeDel(item));
    listEl.appendChild(el);
  });

  container.appendChild(listEl);

  var addRow = document.createElement('div');
  addRow.className = 'todo-add-row';
  var addInp = document.createElement('input');
  addInp.type = 'text';
  addInp.className = 'todo-add-input';
  addInp.placeholder = 'Add task… (Enter)';
  addInp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && this.value.trim()) {
      e.preventDefault();
      parsed.tasks.push({ type: 'task', text: this.value.trim(), done: false });
      this.value = '';
      persist();
      renderDetailTodo(container, p);
      var ni = container.querySelector('.todo-add-input');
      if (ni) ni.focus();
    }
  });
  addRow.appendChild(addInp);
  container.appendChild(addRow);
}

/* ═══════════════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════════════ */
function findPt(id) {
  for (var i = 0; i < patients.length; i++) {
    if (String(patients[i].ID) === String(id)) return patients[i];
  }
  return null;
}
function gv(id) { return document.getElementById(id).value.trim(); }
function sv(id, v) { document.getElementById(id).value = v || ''; }
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(function() { t.classList.remove('show'); }, 2500);
}
</script>
